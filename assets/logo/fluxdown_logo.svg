<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 Slate-800→700 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- 左侧流线 -->
  <path d="M 138 92 Q 112 180 145 256 Q 178 332 148 420"
        stroke="#38578c" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- 右侧流线 -->
  <path d="M 374 92 Q 400 180 367 256 Q 334 332 364 420"
        stroke="#38578c" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- 竖杆 -->
  <rect x="232" y="97" width="48" height="192" rx="24" fill="url(#arrowGrad)"/>

  <!-- V形箭头 -->
  <path d="M 138 268 L 256 404 L 374 268"
        stroke="url(#arrowGrad)" stroke-width="48" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>

  <!-- 速度线 -->
  <line x1="102" y1="154" x2="102" y2="214" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="77"  y1="180" x2="77"  y2="230" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
  <line x1="410" y1="154" x2="410" y2="214" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="435" y1="180" x2="435" y2="230" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
</svg>
