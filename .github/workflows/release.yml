name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 并行 Job 1: 构建 Windows 安装包（x64 + ARM64）──
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # ── Rust toolchain ──
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ matrix.arch }}-

      - name: Cache Rinf CLI
        id: cache-rinf
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/rinf.exe
          key: rinf-cli-${{ runner.os }}-${{ matrix.arch }}-8.9.0

      # ── Flutter SDK（x64 用预编译包，ARM64 用 git clone 原生安装）──
      - name: Setup Flutter (x64)
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Flutter (ARM64 via git)
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$USERPROFILE/flutter"
          echo "$USERPROFILE/flutter/bin" >> "$GITHUB_PATH"

      - name: Cache Flutter (ARM64)
        if: matrix.arch == 'arm64'
        uses: actions/cache@v4
        with:
          path: ~/flutter/bin/cache
          key: flutter-arm64-stable

      - name: Flutter precache & version info
        run: |
          flutter --version
          flutter precache --windows

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Rinf code generation ──
      - name: Install Rinf CLI
        if: steps.cache-rinf.outputs.cache-hit != 'true'
        run: cargo install rinf_cli@8.9.0

      - name: Generate Rinf bindings
        run: rinf gen

      # ── Build ──
      - name: Build Flutter Windows app
        run: flutter build windows --release --build-name=${{ steps.version.outputs.VERSION }} --build-number=1 --dart-define=APP_VERSION=${{ steps.version.outputs.VERSION }}

      # ── ARM64: Flutter 在 ARM64 runner 上以 x64 仿真运行，输出到 build\windows\x64
      #    但后续步骤（Inno Setup / portable zip）需要 build\windows\arm64 ──
      - name: Normalize build output path for ARM64
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          if ((Test-Path "build\windows\x64") -and -not (Test-Path "build\windows\arm64")) {
            Rename-Item -Path "build\windows\x64" -NewName "arm64"
            Write-Host "Renamed build\windows\x64 -> build\windows\arm64"
          }

      # ── Inno Setup installer ──
      - name: Ensure Inno Setup is installed
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
            echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Download Inno Setup Chinese Simplified language file
        shell: pwsh
        run: |
          $issLangDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile "$issLangDir\ChineseSimplified.isl"

      - name: Build installer with Inno Setup
        run: |
          iscc /DMyAppVersion=${{ steps.version.outputs.VERSION }} /DMyAppArch=${{ matrix.arch }} installer\windows\setup.iss

      # ── Compress portable version ──
      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -Path "build\windows\${{ matrix.arch }}\runner\Release\portable" -ItemType File -Force | Out-Null
          Compress-Archive -Path "build\windows\${{ matrix.arch }}\runner\Release\*" -DestinationPath "build\installer\FluxDown-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip"

      # ── Upload artifacts（供 release job 使用）──
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          path: build/installer/FluxDown-*.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ matrix.arch }}
          path: build/installer/FluxDown-*-portable.zip

  # ── 并行 Job 2: 构建浏览器扩展 ──
  build-extension:
    name: Build Browser Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set extension version from tag
        working-directory: fluxDown
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          echo "Updated extension version to $VERSION"
          grep '"version"' package.json

      - name: Install dependencies
        run: npm ci
        working-directory: fluxDown

      - name: Build Chrome extension
        run: npm run build
        working-directory: fluxDown

      - name: Build Firefox extension
        run: npm run build:firefox
        working-directory: fluxDown

      - name: Package Chrome extension
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p build/extension
          cd fluxDown/.output
          zip -r ../../build/extension/FluxDown-${VERSION}-chrome.zip chrome-mv3/
          ls -la ../../build/extension/

      - name: Install web-ext
        run: npm install -g web-ext

      # ── listed 单步签名 + 上架：--approval-timeout=0 在自动签名完成后立即返回已签名 XPI，
      #    同时将版本提交到 AMO 公开市场审核队列，无需等待人工审核。
      #    这避免了 unlisted 先占版本号导致 listed 提交冲突的问题。
      #    兜底逻辑：
      #      - "already exists"：CI 重跑同版本时，从 AMO API 下载已签名 XPI
      #      - "was uploaded before and deleted"：版本已被永久删除，输出明确错误信息
      - name: Sign & submit Firefox extension to AMO marketplace
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p build/extension

          if ! web-ext sign \
            --source-dir fluxDown/.output/firefox-mv2 \
            --channel=listed \
            --api-key=${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret=${{ secrets.AMO_JWT_SECRET }} \
            --approval-timeout=0 \
            --artifacts-dir build/extension/ 2>&1 | tee /tmp/amo_sign.log; then

            if grep -q "already exists" /tmp/amo_sign.log; then
              echo "::warning::Version $VERSION already on AMO (CI re-run). Downloading existing signed XPI..."
              node - <<'JSEOF'
const crypto = require('crypto');
const https = require('https');
const fs = require('fs');
const ADDON_ID = 'fluxdown@fluxdown.app';
const ISSUER = process.env.AMO_ISSUER;
const SECRET = process.env.AMO_SECRET;
const VERSION = process.env.VERSION;

function jwt() {
  const iat = Math.floor(Date.now() / 1000);
  const h = Buffer.from(JSON.stringify({ alg: 'HS256', typ: 'JWT' })).toString('base64url');
  const p = Buffer.from(JSON.stringify({ iss: ISSUER, jti: `${iat}`, iat, exp: iat + 300 })).toString('base64url');
  const s = crypto.createHmac('sha256', SECRET).update(`${h}.${p}`).digest('base64url');
  return `${h}.${p}.${s}`;
}

function get(url) {
  return new Promise((res, rej) => {
    const u = new URL(url);
    https.get({ hostname: u.hostname, path: u.pathname + u.search, headers: { Authorization: `JWT ${jwt()}` } }, r => {
      if (r.statusCode >= 300 && r.statusCode < 400) return res(get(r.headers.location));
      const chunks = [];
      r.on('data', d => chunks.push(d));
      r.on('end', () => res({ status: r.statusCode, body: Buffer.concat(chunks) }));
    }).on('error', rej);
  });
}

(async () => {
  const r = await get(`https://addons.mozilla.org/api/v5/addons/addon/${encodeURIComponent(ADDON_ID)}/versions/?filter=all_with_unlisted`);
  const data = JSON.parse(r.body.toString());
  const ver = data.results?.find(v => v.version === VERSION);
  if (!ver?.file?.url) {
    console.error('Cannot find signed XPI for', VERSION);
    console.error(JSON.stringify(data, null, 2));
    process.exit(1);
  }
  const dl = await get(ver.file.url);
  const dest = `build/extension/${VERSION}.xpi`;
  fs.writeFileSync(dest, dl.body);
  console.log(`Downloaded ${dl.body.length} bytes → ${dest}`);
})().catch(e => { console.error(e); process.exit(1); });
JSEOF

            elif grep -q "was uploaded before and deleted" /tmp/amo_sign.log; then
              echo "::error::Version $VERSION was previously deleted from AMO and cannot be resubmitted."
              echo "::error::Please use a different version number."
              exit 1

            else
              cat /tmp/amo_sign.log
              exit 1
            fi
          fi

          XPI_FILE=$(ls build/extension/*.xpi 2>/dev/null | head -1)
          if [ -n "$XPI_FILE" ]; then
            mv "$XPI_FILE" "build/extension/FluxDown-${VERSION}-firefox.xpi"
            echo "Firefox XPI ready: build/extension/FluxDown-${VERSION}-firefox.xpi"
          else
            echo "::error::No signed XPI found after signing/download."
            exit 1
          fi
        env:
          AMO_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          VERSION: ${{ steps.version.outputs.VERSION }}

      # ── Upload artifacts（供 release job 使用）──
      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-chrome
          path: build/extension/FluxDown-*-chrome.zip
          if-no-files-found: error

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-firefox
          path: build/extension/FluxDown-*-firefox.xpi
          if-no-files-found: error

  # ── 最终 Job: 等待所有构建完成后统一发布 Release ──
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-extension]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # actions/checkout 会用 --no-tags 将 commit SHA 覆盖到 refs/tags/，
      # 导致 annotated tag 退化为 lightweight tag，需要重新 fetch 恢复。
      - name: Re-fetch annotated tag
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          git fetch origin tag "$TAG_NAME" --force
          echo "tag type: $(git cat-file -t "$TAG_NAME")"

      - name: Extract tag annotation for release notes
        id: tag_message
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # 仅当 tag 是 annotated tag 时，用 cat-file 提取完整注解
          OBJ_TYPE=$(git cat-file -t "$TAG_NAME" 2>/dev/null || echo "unknown")
          if [ "$OBJ_TYPE" = "tag" ]; then
            # cat-file -p 输出 tag 对象，注解从第一个空行之后开始
            TAG_MSG=$(git cat-file -p "$TAG_NAME" | sed '1,/^$/d')
          else
            TAG_MSG=""
          fi
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release $TAG_NAME"
          fi
          # 使用随机 delimiter 避免内容中出现 EOF 导致截断
          DELIM="RELEASE_NOTES_$(openssl rand -hex 8)"
          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      # ── 下载所有构建产物 ──
      - name: Download all Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          path: release-assets/
          merge-multiple: true

      - name: Download browser extensions
        uses: actions/download-artifact@v4
        with:
          pattern: browser-extension-*
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      # ── 创建 Release 并上传所有文件 ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: ${{ steps.tag_message.outputs.body }}
          generate_release_notes: false
          draft: false
