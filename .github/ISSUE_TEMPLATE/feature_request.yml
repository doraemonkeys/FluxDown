name: ✨ 功能建议 / Feature Request
description: 提出一个新功能或改进 / Suggest a new feature or improvement
title: "✨ [Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！好的想法让 FluxDown 变得更好。
        Thanks for the suggestion! Great ideas make FluxDown better.

        > 💡 也可以直接在应用内（状态栏反馈按钮）或[官网反馈页](https://fluxdown.zerx.dev/feedback)提交。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 这个功能想解决什么痛点？/ What problem does this solve?
      placeholder: 我经常需要批量导入 URL，但每次都要手动粘贴……
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed Solution
      description: 你期望它如何工作 / How you'd like it to work
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives
      description: 你考虑过的其他做法（可选）/ Other approaches you considered (optional)
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围 / Scope
      options:
        - 桌面应用 / Desktop App
        - 移动端 / Mobile
        - 浏览器扩展 / Browser Extension
        - 命令行 CLI
        - 官网 / Website
        - 其他 / Other
    validations:
      required: false
